<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UGC Quest - Confirmar cÃ³digo</title>
  <link rel="icon" type="image/png" href="assets/img/logo.png" />
  <link rel="apple-touch-icon" href="assets/img/logo.png" />
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">
        <img src="assets/img/logo.png" alt="Makerline" />
      </div>
      <div>
        <div class="brand-name">Makerline</div>
        <div class="brand-tag">Painel comercial para creators</div>
      </div>
    </div>

    <div>
      <h2>Confirma o cÃ³digo</h2>
      <p>A gente te mandou um cÃ³digo por e-mail. Cola ele aqui pra trocar a senha.</p>
    </div>

    <form class="auth-form active" id="verify-form">
      <div class="form-row">
        <label>Email</label>
        <input class="input" name="email" type="email" placeholder="seu@email.com" required />
      </div>
      <div class="form-row">
        <label>CÃ³digo (6 dÃ­gitos)</label>
        <input class="input" name="code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="000000" maxlength="6" required />
      </div>
      <div style="display: flex; gap: 10px; align-items: center;">
        <button class="btn btn-primary" type="submit">Confirmar</button>
        <button class="btn btn-ghost" type="button" id="resend-btn">Reenviar cÃ³digo</button>
      </div>
      <div class="muted" id="verify-msg"></div>
    </form>

    <div class="auth-footer">
      <a class="auth-link" href="index.html">Voltar pro login</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const emailParam = params.get('email') || '';
    const codeParam = params.get('code') || '';
    const form = document.getElementById('verify-form');
    const msg = document.getElementById('verify-msg');
    const resendBtn = document.getElementById('resend-btn');

    const emailInput = form.querySelector('input[name="email"]');
    const codeInput = form.querySelector('input[name="code"]');
    const storedEmail = (() => {
      try { return sessionStorage.getItem('ugcQuestResetEmail') || ''; } catch (e) { return ''; }
    })();
    const storedCode = (() => {
      try { return sessionStorage.getItem('ugcQuestResetCode') || ''; } catch (e) { return ''; }
    })();

    if (emailParam) emailInput.value = emailParam;
    if (!emailInput.value && storedEmail) emailInput.value = storedEmail;

    const normalizeCode = (value) => (value || '').replace(/\D/g, '').slice(0, 6);

    codeInput.addEventListener('input', () => {
      codeInput.value = normalizeCode(codeInput.value);
    });

    const initialCode = normalizeCode(codeParam) || normalizeCode(storedCode);
    if (initialCode) {
      codeInput.value = initialCode;
      msg.textContent = 'JÃ¡ colei o cÃ³digo aqui. SÃ³ confirmar.';
    }

    const resendCode = async () => {
      const email = (emailInput.value || '').trim().toLowerCase();
      if (!email) {
        msg.textContent = 'Coloca seu email pra eu mandar o cÃ³digo.';
        return;
      }
      msg.textContent = 'Enviando cÃ³digo...';
      try {
        const res = await fetch('api/forgot.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) {
          msg.textContent = data.error || 'NÃ£o consegui enviar.';
          return;
        }
        msg.textContent = data.message || 'CÃ³digo enviado.';
        if (data.code) {
          const clean = normalizeCode(data.code);
          codeInput.value = clean;
          msg.textContent += ` CÃ³digo: ${clean}`;
          try {
            sessionStorage.setItem('ugcQuestResetCode', clean);
            sessionStorage.setItem('ugcQuestResetEmail', email);
          } catch (e) {}
        }
      } catch (err) {
        msg.textContent = 'NÃ£o consegui enviar.';
      }
    };

    resendBtn.addEventListener('click', resendCode);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = (emailInput.value || '').trim().toLowerCase();
      const code = normalizeCode(codeInput.value);

      if (!email) {
        msg.textContent = 'Coloca seu email.';
        return;
      }
      if (code.length !== 6) {
        msg.textContent = 'O cÃ³digo tem 6 dÃ­gitos.';
        return;
      }

      msg.textContent = 'Confirmando...';
      try {
        const res = await fetch('api/verify.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code })
        });
        const data = await res.json();
        if (!res.ok) {
          msg.textContent = data.error || 'CÃ³digo invÃ¡lido.';
          return;
        }
        if (data.resetLink) {
          try {
            sessionStorage.removeItem('ugcQuestResetCode');
            sessionStorage.removeItem('ugcQuestResetEmail');
          } catch (e) {}
          window.location.replace(data.resetLink);
          return;
        }
        msg.textContent = 'Deu certo, mas faltou o link de reset.';
      } catch (err) {
        msg.textContent = 'NÃ£o consegui confirmar.';
      }
    });
  </script>
</body>
</html>
