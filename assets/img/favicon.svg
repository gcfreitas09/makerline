<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="ml-front" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C6BFF" />
      <stop offset="1" stop-color="#38BDF8" />
    </linearGradient>
    <linearGradient id="ml-top" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#5AD4FF" />
      <stop offset="1" stop-color="#38BDF8" />
    </linearGradient>
    <linearGradient id="ml-side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB" />
      <stop offset="1" stop-color="#0EA5E9" />
    </linearGradient>
  </defs>

  <!-- Step 1 -->
  <polygon points="9,39 15,33 29,33 23,39" fill="url(#ml-top)" />
  <polygon points="23,39 29,33 29,47 23,53" fill="url(#ml-side)" opacity="0.85" />
  <rect x="9" y="39" width="14" height="14" rx="3" fill="url(#ml-front)" />

  <!-- Step 2 -->
  <polygon points="26,27 32,21 46,21 40,27" fill="url(#ml-top)" />
  <polygon points="40,27 46,21 46,47 40,53" fill="url(#ml-side)" opacity="0.9" />
  <rect x="26" y="27" width="14" height="26" rx="3" fill="url(#ml-front)" />

  <!-- Step 3 -->
  <polygon points="43,13 49,7 63,7 57,13" fill="url(#ml-top)" />
  <polygon points="57,13 63,7 63,47 57,53" fill="url(#ml-side)" />
  <rect x="43" y="13" width="14" height="40" rx="3" fill="url(#ml-front)" />
</svg>

